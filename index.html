<!doctype html>
<html>
  <head>
   <meta charset="utf-8" />
  <script src="jquery-4.0.0.min.js"></script>
   <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
   integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin=""/>

   <link
   href="https://fonts.googleapis.com/css2?family=Open+Sans"
   rel="stylesheet"
   type="text/css" />
  
   <link
   href="style.css"
   rel="stylesheet"
   type="text/css" />

   <title>Talleres centro cultural</title>
   <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
   integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
   crossorigin=""></script>
   <script src="mapa.js"></script>
   <script src="main.js" defer></script>
   <script src="BuscarTallerEnJson.js" defer></script>
   

  </head>

  <body>
    <h1 id="Titulo">Talleres del centro cultural</h1>

    <div class="contenedor-principal">
     <div class="columna-izquierda">
        <button id="btnAbrir">Registrarse</button>
      </div>
     <div class="columna-derecha">
        <h1>Titulo de mi seccion</h1>
        <form>
          <label id="buscador_talleres" for="gsearch">Buscar talleres:</label>
          <input type="search" id="gsearch" name="gsearch">
          <button id="btn_buscar_taller" type="submit">Buscar</button>
        </form>
        
        <br>
        <ol id="lista-talleres"> </ol>
      </div>
    <div id="mapa">

    </div>
    
    </div>
    <div id="miOculto" class="oculto">
     <div class="contenido-oculto">
      <span class="cerrar">&times;</span>
      <h2>Registro</h2>
      <form>
       <label for="campo_nombre">Nombre</label>
       <br>
       <input id="campo_nombre" name="nombre" type="text" required>
       <br>
       <br>
       <label for="campo_telefono">Telefono</label>
       <br>
       <input id="campo_telefono" name="telefono" type="tel" required>
       <br>
       <br>
       <label for="campo_mail">Mail</label>
       <br>
       <input id="campo_mail" name="email" type="mail" required>
       <br>
       <br>
       <button type="submit">Enviar</button>
     </form>
    </div>
   </div>
  </body>
</html>
