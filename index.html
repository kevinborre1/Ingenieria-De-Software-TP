<!doctype html>
<html>

<head>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="jquery-4.0.0.min.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <link href="https://fonts.googleapis.com/css2?family=Open+Sans" rel="stylesheet" type="text/css" />

  <link href="style.css" rel="stylesheet" type="text/css" />

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />

  <title>Talleres centro cultural</title>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <script type="module" src="Mapa.js" defer></script>
  <script type="module" src="LogicaDelFormulario.js" defer></script>
  <script type="module" src="BuscarTaller.js"></script>

  <p id="centro_cultural"> 🧵Centro Cultural✂️</p>

</head>

<body>
  <div id="titulo_registrarse">
    <h1 id="Titulo">Talleres del Centro Cultural</h1>
    <button id="btnAbrir">Registrar Taller</button>
  </div>


  <div class="contenedor-principal">
    <div class="columna-izquierda">
      <form id="form_busqueda">
        <input type="search" id="gsearch" name="gsearch" placeholder="Buscar taller por nombre...">
        <button id="btn_buscar_taller" type="submit"> <i class="fas fa-search"></i> Buscar</button>
      </form>

      <br>
      <ul id="lista-talleres"> </ul>
      <br>

    </div>

    <div class="columna-derecha">
      <div id="mapa"> </div>
    </div>

    <div id="miOculto" class="oculto">
      <div class="contenido-oculto">
        <span class="cerrar">&times;</span>

        <form id="form-registro-completo" action="">

          <img id="img_formulario" src="dist/images/form1.png" alt="decoración" style="width: 100%; margin-bottom: 16px; display: block;">
          <div id="paso-proveedor">
            <h2>Registro de Proveedor</h2>
            <label for="campo_nombre">Nombre</label><br>
            <input id="campo_nombre" type="text" required><br><br>

            <label for="campo_telefono">Teléfono</label><br>
            <input id="campo_telefono" type="tel" required pattern="[0-9]+" inputmode="numeric">

            <label for="campo_mail">Mail</label><br>
            <input id="campo_mail" type="email" required><br><br>

            <button type="button" id="btnSiguiente">Siguiente</button>
          </div>

          <div id="paso-taller" style="display: none;">
            <h2>Información del Taller</h2>
            <label for="campo_taller">Taller</label><br>
            <input id="campo_taller" type="text" required><br><br>

            <label for="campo_rubro">Rubro</label><br>
            <input id="campo_rubro" type="text" required><br><br>

            <label for="campo_descripcion">Descripción</label><br>
            <textarea id="campo_descripcion" type="text"  maxlength="100" rows="6" cols="37" required></textarea><br><br>

            <label for="campo_actividades">Actividades ofrecidas</label><br>
            <input id="campo_actividades" type="text" required><br><br>

            <label for="campo_ubicacion_tipo">Ubicación</label><br>
           
            <select id="campo_ubicacion_tipo" required>
              <option value="">-- Seleccioná una opción --</option>
              <option value="sede">Sede</option>
              <option value="otra">Otra</option>
            </select><br><br>

            <div id="div_direccion_otra" style="display:none;">
              <label for="campo_direccion_otra">Indicá la dirección</label><br>
              <input id="campo_direccion_otra" type="text" placeholder="Ej: Club barrial, Plaza..."><br><br>
            </div>

            <label for="campo_logo">Logo del taller(opcional)</label><br>
            <input id="campo_logo" type="file" accept="image/*"><br><br>

            <button type="button" id="btnVolver">Atrás</button>
            <button type="button" id="btnSiguiente2">Siguiente</button>
          </div>

          <div id="paso-redes" style="display: none;">
            <h2>Redes Sociales del Taller (Opcional)</h2>
            <label for="campo_twitter">Twitter</label><br>
            <input id="campo_twitter" type="text"><br><br>

            <label for="campo_instagram">Instagram</label><br>
            <input id="campo_instagram" type="text"><br><br>

            <label for="campo_facebook">Facebook</label><br>
            <input id="campo_facebook" type="text"><br><br>

            <button type="button" id="btnVolver2">Atrás</button>
            <button type="submit" id="btnEnviar">Enviar Registro</button>
             
          </div>
        </form>
      </div>
    </div>


</body>

</html>
